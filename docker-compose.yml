services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gamif
      POSTGRES_PASSWORD: gamif
      POSTGRES_DB: gamif
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamif"]
      interval: 5s
      retries: 5

volumes:
  postgres-data:
